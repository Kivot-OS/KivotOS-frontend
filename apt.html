<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KivotOS APT Repository — Browse Files</title>
    <meta name="description" content="Browse the KivotOS APT repository files and packages." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%238839ef'/%3E%3Ctext x='16' y='23' font-family='system-ui%2Csans-serif' font-weight='700' font-size='20' fill='white' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles/themes/catppuccin-latte.css" />
    <link rel="stylesheet" href="./styles/themes/catppuccin-mocha.css" />
    <link rel="stylesheet" href="./styles/apt.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="header-content">
          <a
            href="./index.html"
            class="back-link"
            aria-label="Go back to main page"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
              fill="currentColor"
              class="back-arrow-icon"
            >
              <path
                d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z"
              ></path>
            </svg>
          </a>
          <div>
            <h1>KivotOS APT Repository</h1>
            <p class="subtitle">Browse packages in /apt/</p>
          </div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <img src="./assets/sun.svg" alt="" aria-hidden="true" />
        </button>
      </header>

      <main>
        <section class="card usage-section">
          <div class="card-header">
            <h3>Repository Usage</h3>
          </div>
          <div class="card-content">
            <div class="command-box">
              <code id="repo-command"
                >deb [signed-by=/usr/share/keyrings/kivotos.gpg]
                https://kivotos-repo.dungdinhmanh0209.workers.dev/ trixie main</code
              >
              <button
                class="copy-btn"
                data-copy-id="repo-command"
              >
                Copy
              </button>
            </div>
          </div>
        </section>

        <section class="card file-listing">
          <div class="card-header">
            <h3>Browse Files</h3>
          </div>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th class="hide-mobile">Last Modified</th>
                <th class="hide-mobile">Size</th>
              </tr>
            </thead>
            <tbody id="file-list">
              <tr>
                <td>
                  <i data-lucide="folder" class="file-icon"></i>
                  <a href="../" class="file-link">..</a>
                </td>
                <td class="hide-mobile">-</td>
                <td class="hide-mobile">-</td>
              </tr>
              <tr>
                <td colspan="3" class="loading-message">
                  Loading repository contents...
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@0.488.0/dist/umd/lucide.min.js"></script>
    <script src="./assets/js/apt.js"></script>
  </body>
</html>
